<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MycoDefensAI - AI Mushroom Analysis</title>
    <style>
        :root {
            --bg-gradient-1: #0a1410;
            --bg-gradient-2: #040806;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-safe: #10b981;
            --accent-danger: #ef4444;
            --accent-glow-safe: rgba(16, 185, 129, 0.2);
            --accent-glow-danger: rgba(239, 68, 68, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #ffffff, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 0.95rem;
            appearance: none;
            -webkit-appearance: none;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .select-wrapper select:focus {
            border-color: rgba(167, 243, 208, 0.4);
            box-shadow: 0 0 0 3px rgba(167, 243, 208, 0.1);
        }

        .select-wrapper select option[value=""][disabled] {
            color: var(--text-muted);
        }

        .select-wrapper::after {
            content: "↓";
            font-size: 0.8rem;
            color: var(--text-muted);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #0f766e, #115e59);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
            background: linear-gradient(135deg, #115e59, #134e4a);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 30px;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.5s ease forwards;
        }

        .result-box.safe {
            background: rgba(16, 185, 129, 0.06);
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 20px var(--accent-glow-safe);
        }

        .result-box.danger {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 20px var(--accent-glow-danger);
        }

        .result-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .result-box.safe .result-title { color: var(--accent-safe); }
        .result-box.danger .result-title { color: var(--accent-danger); }

        .result-detail {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid var(--panel-border);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-brand {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .footer-dev {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .footer-dev span {
            color: var(--accent-safe);
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>MycoDefensAI</h1>
            <p>Yapay Zeka Destekli Mantar Sınıflandırma Sistemi</p>
        </header>

        <form action="/predict" method="POST">
            <div class="form-group">
                <label for="koku">Belirgin Koku</label>
                <div class="select-wrapper">
                    <select name="koku" id="koku" required>
                        <option value="" disabled selected>Seçiniz...</option>
                        <option value="0">Koku Yok (Nötr)</option>
                        <option value="1">Badem Kokusu</option>
                        <option value="2">Anason Kokusu</option>
                        <option value="3">Acre / Keskin Kötü Koku</option>
                        <option value="5">Baharatlı Koku</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="renk">Şapka Rengi</label>
                <div class="select-wrapper">
                    <select name="renk" id="renk" required>
                        <option value="" disabled selected>Seçiniz...</option>
                        <option value="0">Kahverengi Tonları</option>
                        <option value="1">Sarı / Siyah Tonları</option>
                        <option value="2">Beyaz / Krem Tonları</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="habitat">Yetiştiği Doğal Ortam</label>
                <div class="select-wrapper">
                    <select name="habitat" id="habitat" required>
                        <option value="" disabled selected>Seçiniz...</option>
                        <option value="0">Çimenlik / Açık Alan</option>
                        <option value="1">Yapraklı Orman İçi</option>
                        <option value="2">Patika / Yol Kenarı</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">Örneği Analiz Et</button>
        </form>

        {% if prediction %}
        <div class="result-box {{ css_class }}">
            <div class="result-title">{{ prediction }}</div>
            <div class="result-detail">{{ detail }}</div>
        </div>
        {% endif %}

        <footer>
            <div class="footer-brand">&copy; 2026 MycoDefensAI. Tüm Hakları Saklıdır.</div>
            <div class="footer-dev">Designed & Engineered by <span>Bertan Ateş</span></div>
        </footer>
    </div>

</body>
</html>
